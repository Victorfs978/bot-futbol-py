name: Victor_Ofensiva_Final

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora solo
  workflow_dispatch: # Botón para disparar manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Ejecutar Ataque
        run: python bot.py

      - name: Guardar y Subir Cambios
        run: |
          git config --global user.name "Victor-Bot"
          git config --global user.email "bot@github.com"
          git add lista_canales.txt
          git commit -m "Actualización Masiva MadPlay77" || exit 0
          git push
          
